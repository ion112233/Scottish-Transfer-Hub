name: Hourly transfer check

on:
  schedule:
    # Runs at minute 5 of every hour (UTC)
    - cron: "5 * * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (build video but do not upload)"
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: hourly-transfers
  cancel-in-progress: false

jobs:
  check-and-post:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies (ffmpeg, fonts)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fonts-dejavu-core

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run transfer check
        env:
          SPORTMONKS_API_TOKEN: ${{ secrets.SPORTMONKS_API_TOKEN }}
          SCOTTISH_LEAGUE_IDS: ${{ secrets.SCOTTISH_LEAGUE_IDS }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: python main.py

      - name: Upload generated videos (dry run only)
        if: ${{ github.event.inputs.dry_run == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: transfer-videos
          path: output/*.mp4
          if-no-files-found: ignore
          retention-days: 7

      - name: Commit updated state
        run: |
          git config user.name "transfer-bot"
          git config user.email "actions@github.com"
          if [ -n "$(git status --porcelain state.json)" ]; then
            git add state.json
            git commit -m "Update last seen transfer id [skip ci]"
            git push
          else
            echo "No state change, nothing to commit."
          fi
